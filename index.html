<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Progress Tracker</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6fb;
            color: #333;
            transition: .3s;
        }

        body.dark {
            background: #181818;
            color: #eee;
        }

        header {
            background: #4f46e5;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            margin-bottom: 20px;
        }

        body.dark .card {
            background: #252525;
        }

        h2 {
            margin-bottom: 15px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type=number] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        body.dark input {
            background: #333;
            color: white;
            border: 1px solid #555;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 12px 18px;
            border-radius: 8px;
            margin: 5px;
            font-size: 15px;
        }

        .primary {
            background: #4f46e5;
            color: white;
        }

        .secondary {
            background: #e5e7eb;
        }

        body.dark .secondary {
            background: #444;
            color: white;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .stat {
            background: #eef2ff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        body.dark .stat {
            background: #303030;
        }

        .stat h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat p {
            font-size: 22px;
            font-weight: bold;
        }

        .chart-box {
            text-align: center;
        }

        canvas {
            max-width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        body.dark th,
        body.dark td {
            border-color: #444;
        }

        thead {
            background: #f1f1f1;
        }

        body.dark thead {
            background: #333;
        }

        .error {
            color: red;
            margin-top: 10px;
            min-height: 20px;
        }

        #themeBtn {
            background: white;
            color: #4f46e5;
            font-weight: bold;
        }

        body.dark #themeBtn {
            background: #444;
            color: white;
        }

        @media(max-width:900px) {

            .grid {
                grid-template-columns: 1fr;
            }

            .row {
                grid-template-columns: repeat(2, 1fr);
            }

        }

        @media(max-width:500px) {

            .row {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

        }
    </style>

</head>

<body>

    <header>
        <h1>Tutorial Progress Tracker</h1>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <div class="container">

        <div class="grid">

            <div>

                <div class="card">

                    <h2>Total Tutorial Length</h2>

                    <div class="row">

                        <div class="input-group">
                            <label>Days</label>
                            <input type="number" id="tdays" min="0">
                        </div>

                        <div class="input-group">
                            <label>Hours</label>
                            <input type="number" id="thours" min="0" max="23">
                        </div>

                        <div class="input-group">
                            <label>Minutes</label>
                            <input type="number" id="tminutes" min="0" max="59">
                        </div>

                        <div class="input-group">
                            <label>Seconds</label>
                            <input type="number" id="tseconds" min="0" max="59">
                        </div>

                    </div>

                </div>

                <div class="card">

                    <h2>Current Progress</h2>

                    <div class="row">

                        <div class="input-group">
                            <label>Days</label>
                            <input type="number" id="cdays" min="0">
                        </div>

                        <div class="input-group">
                            <label>Hours</label>
                            <input type="number" id="chours" min="0" max="23">
                        </div>

                        <div class="input-group">
                            <label>Minutes</label>
                            <input type="number" id="cminutes" min="0" max="59">
                        </div>

                        <div class="input-group">
                            <label>Seconds</label>
                            <input type="number" id="cseconds" min="0" max="59">
                        </div>

                    </div>

                    <button class="primary" id="saveBtn">
                        💾 Save Progress
                    </button>

                    <div class="error" id="error"></div>

                </div>

                <div class="card">

                    <h2>Statistics</h2>

                    <div class="stats">

                        <div class="stat">
                            <h3>Completion</h3>
                            <p id="percentStat">0%</p>
                        </div>

                        <div class="stat">
                            <h3>Current</h3>
                            <p id="currentStat">0s</p>
                        </div>

                        <div class="stat">
                            <h3>Remaining</h3>
                            <p id="remainingStat">0s</p>
                        </div>

                        <div class="stat">
                            <h3>Total</h3>
                            <p id="totalStat">0s</p>
                        </div>

                        <div class="stat">
                            <h3>Saves</h3>
                            <p id="saveCount">0</p>
                        </div>

                    </div>

                </div>

                <div class="card">

                    <h2>History</h2>

                    <table>

                        <thead>

                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Progress</th>
                                <th>%</th>
                            </tr>

                        </thead>

                        <tbody id="historyBody">

                            <tr>

                                <td colspan="4" style="text-align:center">
                                    No history yet
                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

                <div class="card">

                    <h2>Data</h2>

                    <div class="actions">

                        <button class="secondary" id="exportBtn">
                            Export JSON
                        </button>

                        <button class="secondary" id="importBtn">
                            Import JSON
                        </button>

                        <button class="secondary" id="clearBtn">
                            Clear All
                        </button>

                        <input type="file" id="fileInput" accept=".json" hidden>

                    </div>

                </div>

            </div>

            <div>

                <div class="card chart-box">

                    <h2>Completion</h2>

                    <canvas id="pieChart" width="280" height="280">
                    </canvas>

                    <h2 id="pieText">
                        0%
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <script>

        // -----------------------------
        // Tutorial Progress Tracker
        // Part 2A
        // -----------------------------

        const STORAGE_KEY = "tutorialProgressTracker";

        // ---------- Elements ----------
        const tdays = document.getElementById("tdays");
        const thours = document.getElementById("thours");
        const tminutes = document.getElementById("tminutes");
        const tseconds = document.getElementById("tseconds");

        const cdays = document.getElementById("cdays");
        const chours = document.getElementById("chours");
        const cminutes = document.getElementById("cminutes");
        const cseconds = document.getElementById("cseconds");

        const saveBtn = document.getElementById("saveBtn");
        const exportBtn = document.getElementById("exportBtn");
        const importBtn = document.getElementById("importBtn");
        const clearBtn = document.getElementById("clearBtn");
        const fileInput = document.getElementById("fileInput");

        const errorBox = document.getElementById("error");

        const percentStat = document.getElementById("percentStat");
        const currentStat = document.getElementById("currentStat");
        const remainingStat = document.getElementById("remainingStat");
        const totalStat = document.getElementById("totalStat");
        const saveCount = document.getElementById("saveCount");

        const historyBody = document.getElementById("historyBody");

        const canvas = document.getElementById("pieChart");
        const ctx = canvas.getContext("2d");
        const pieText = document.getElementById("pieText");

        const themeBtn = document.getElementById("themeBtn");

        // ---------- Data ----------
        let appData = {
            totalSeconds: 0,
            currentSeconds: 0,
            history: []
        };

        // ---------- Helpers ----------
        function value(input) {
            return Number(input.value) || 0;
        }

        function durationToSeconds(d, h, m, s) {

            return (
                (((d * 24) + h) * 60 + m) * 60 + s
            );

        }

        function secondsToDuration(total) {

            total = Math.floor(total);

            const days = Math.floor(total / 86400);

            total %= 86400;

            const hours = Math.floor(total / 3600);

            total %= 3600;

            const minutes = Math.floor(total / 60);

            const seconds = total % 60;

            let text = "";

            if (days) text += days + "d ";
            if (hours) text += hours + "h ";
            if (minutes) text += minutes + "m ";

            text += seconds + "s";

            return text;

        }

        // ---------- Validation ----------
        function validateInputs() {

            if (value(thours) > 23) return "Hours must be 0-23";
            if (value(chours) > 23) return "Hours must be 0-23";

            if (value(tminutes) > 59) return "Minutes must be 0-59";
            if (value(cminutes) > 59) return "Minutes must be 0-59";

            if (value(tseconds) > 59) return "Seconds must be 0-59";
            if (value(cseconds) > 59) return "Seconds must be 0-59";

            const total = durationToSeconds(
                value(tdays),
                value(thours),
                value(tminutes),
                value(tseconds)
            );

            const current = durationToSeconds(
                value(cdays),
                value(chours),
                value(cminutes),
                value(cseconds)
            );

            if (total <= 0)
                return "Total duration must be greater than zero.";

            if (current > total)
                return "Current progress cannot exceed total duration.";

            return "";

        }

        // ---------- Storage ----------
        function saveStorage() {

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(appData)
            );

        }

        function loadStorage() {

            const saved = localStorage.getItem(STORAGE_KEY);

            if (saved) {

                appData = JSON.parse(saved);

                fillInputs();

            }

        }

        // ---------- Fill Inputs ----------
        function fillInputs() {

            let total = appData.totalSeconds;

            tdays.value = Math.floor(total / 86400);

            total %= 86400;

            thours.value = Math.floor(total / 3600);

            total %= 3600;

            tminutes.value = Math.floor(total / 60);

            tseconds.value = total % 60;

            let current = appData.currentSeconds;

            cdays.value = Math.floor(current / 86400);

            current %= 86400;

            chours.value = Math.floor(current / 3600);

            current %= 3600;

            cminutes.value = Math.floor(current / 60);

            cseconds.value = current % 60;

        }

        // ---------- Theme ----------
        function loadTheme() {

            const mode = localStorage.getItem("theme");

            if (mode === "dark") {

                document.body.classList.add("dark");

                themeBtn.textContent = "☀ Light Mode";

            }

        }

        themeBtn.onclick = () => {

            document.body.classList.toggle("dark");

            const dark = document.body.classList.contains("dark");

            localStorage.setItem(
                "theme",
                dark ? "dark" : "light"
            );

            themeBtn.textContent =
                dark ? "☀ Light Mode" : "🌙 Dark Mode";

        };

        // ---------- Statistics ----------
        function updateStats() {

            const total = appData.totalSeconds;

            const current = appData.currentSeconds;

            const percent =
                total === 0
                    ? 0
                    : (current / total * 100);

            percentStat.textContent =
                percent.toFixed(1) + "%";

            currentStat.textContent =
                secondsToDuration(current);

            remainingStat.textContent =
                secondsToDuration(
                    Math.max(total - current, 0)
                );

            totalStat.textContent =
                secondsToDuration(total);

            saveCount.textContent =
                appData.history.length;

            pieText.textContent =
                percent.toFixed(1) + "%";

        }

        // ---------- Initialize ----------
        loadStorage();
        loadTheme();
        updateStats();

        // ======================================
        // PART 2B-1A
        // Animated Pie Chart
        // ======================================

        let displayedPercent = 0;

        // Draw pie chart
        function drawPie(percent) {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = 100;

            // Background circle
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = "#e5e7eb";
            ctx.lineWidth = 25;
            ctx.stroke();

            // Completed arc
            const start = -Math.PI / 2;
            const end = start + (Math.PI * 2 * (percent / 100));

            ctx.beginPath();
            ctx.arc(cx, cy, radius, start, end);
            ctx.strokeStyle = "#4f46e5";
            ctx.lineWidth = 25;
            ctx.lineCap = "round";
            ctx.stroke();

            // Center text
            ctx.fillStyle = document.body.classList.contains("dark")
                ? "#ffffff"
                : "#222222";

            ctx.textAlign = "center";

            ctx.font = "bold 28px Arial";
            ctx.fillText(percent.toFixed(1) + "%", cx, cy - 5);

            ctx.font = "16px Arial";
            ctx.fillText("Completed", cx, cy + 25);
        }

        // Animate progress change
        function animatePie(target) {

            target = Math.max(0, Math.min(100, target));

            cancelAnimationFrame(window.pieAnimation);

            function frame() {

                const diff = target - displayedPercent;

                if (Math.abs(diff) < 0.1) {

                    displayedPercent = target;
                    drawPie(displayedPercent);
                    return;

                }

                displayedPercent += diff * 0.12;

                drawPie(displayedPercent);

                window.pieAnimation = requestAnimationFrame(frame);

            }

            frame();

        }

        // Refresh chart from current data
        function refreshPie() {

            let percent = 0;

            if (appData.totalSeconds > 0) {

                percent =
                    (appData.currentSeconds /
                        appData.totalSeconds) * 100;

            }

            animatePie(percent);

        }

        // Draw initial chart
        refreshPie();

        // ======================================
        // PART 2B-1B(i)
        // History + Save Progress Logic
        // ======================================


        // Format date for history table
        function formatDate(dateString) {

            const date = new Date(dateString);

            return date.toLocaleDateString(
                undefined,
                {
                    month: "short",
                    day: "numeric"
                }
            );

        }


        // Format time for history table
        function formatTime(dateString) {

            const date = new Date(dateString);

            return date.toLocaleTimeString(
                undefined,
                {
                    hour: "numeric",
                    minute: "2-digit"
                }
            );

        }


        // Render history table
        function renderHistory() {

            historyBody.innerHTML = "";


            if (appData.history.length === 0) {

                historyBody.innerHTML =
                    `
        <tr>
            <td colspan="4" style="text-align:center">
                No history yet
            </td>
        </tr>
        `;

                return;

            }


            // newest first
            const history =
                [...appData.history]
                    .reverse();


            history.forEach(item => {


                const row =
                    document.createElement("tr");


                row.innerHTML =
                    `
        <td>
            ${formatDate(item.savedAt)}
        </td>

        <td>
            ${formatTime(item.savedAt)}
        </td>

        <td>
            ${secondsToDuration(item.currentSeconds)}
        </td>

        <td>
            ${item.percent.toFixed(1)}%
        </td>
        `;


                historyBody.appendChild(row);


            });

        }


        // Read current input values
        function getCurrentInputSeconds() {

            return durationToSeconds(
                value(cdays),
                value(chours),
                value(cminutes),
                value(cseconds)
            );

        }


        function getTotalInputSeconds() {

            return durationToSeconds(
                value(tdays),
                value(thours),
                value(tminutes),
                value(tseconds)
            );

        }


        // Save progress
        function saveProgress() {

            errorBox.textContent = "";


            const error = validateInputs();


            if (error) {

                errorBox.textContent = error;

                return;

            }


            const totalSeconds =
                getTotalInputSeconds();


            const currentSeconds =
                getCurrentInputSeconds();


            const percent =
                (currentSeconds / totalSeconds) * 100;



            appData.totalSeconds =
                totalSeconds;


            appData.currentSeconds =
                currentSeconds;



            const record = {

                savedAt:
                    new Date().toISOString(),

                currentSeconds,

                percent

            };


            appData.history.push(record);



            saveStorage();


            updateStats();


            renderHistory();


            refreshPie();

        }


        // Initial history display
        renderHistory();

        // ======================================
        // PART 2B-1B(ii)
        // Event Connections
        // ======================================


        // Save button
        saveBtn.addEventListener("click", () => {

            saveProgress();

        });


        // Update preview while editing inputs
        const progressInputs = [
            cdays,
            chours,
            cminutes,
            cseconds
        ];


        progressInputs.forEach(input => {

            input.addEventListener("input", () => {

                const current =
                    getCurrentInputSeconds();

                appData.currentSeconds =
                    current;

                updateStats();

                refreshPie();

            });

        });



        // Update total duration preview
        const totalInputs = [
            tdays,
            thours,
            tminutes,
            tseconds
        ];


        totalInputs.forEach(input => {

            input.addEventListener("input", () => {


                const total =
                    getTotalInputSeconds();


                appData.totalSeconds =
                    total;


                updateStats();

                refreshPie();


            });

        });



        // Refresh everything after page loading
        function refreshApp() {

            updateStats();

            renderHistory();

            refreshPie();

        }


        refreshApp();

        // ======================================
        // PART 2B-2
        // Export / Import / Clear All
        // ======================================


        // Export JSON
        exportBtn.addEventListener("click", () => {

            const data =
                JSON.stringify(
                    appData,
                    null,
                    4
                );


            const blob =
                new Blob(
                    [data],
                    {
                        type: "application/json"
                    }
                );


            const url =
                URL.createObjectURL(blob);


            const link =
                document.createElement("a");


            link.href = url;

            link.download =
                "tutorial-progress-backup.json";


            link.click();


            URL.revokeObjectURL(url);

        });



        // Open import dialog
        importBtn.addEventListener("click", () => {

            fileInput.click();

        });



        // Import JSON
        fileInput.addEventListener("change", (event) => {


            const file =
                event.target.files[0];


            if (!file)
                return;



            const reader =
                new FileReader();



            reader.onload = function (e) {


                try {


                    const imported =
                        JSON.parse(e.target.result);



                    if (
                        typeof imported.totalSeconds !== "number" ||
                        typeof imported.currentSeconds !== "number" ||
                        !Array.isArray(imported.history)
                    ) {

                        alert("Invalid backup file.");

                        return;

                    }



                    appData = imported;


                    saveStorage();


                    fillInputs();

                    updateStats();

                    renderHistory();

                    refreshPie();


                    alert(
                        "Data imported successfully."
                    );


                }
                catch (error) {


                    alert(
                        "Could not import file."
                    );


                }


            };


            reader.readAsText(file);


        });



        // Clear all data
        clearBtn.addEventListener("click", () => {


            const confirmDelete =
                confirm(
                    "Delete all tutorial progress data?"
                );


            if (!confirmDelete)
                return;



            localStorage.removeItem(
                STORAGE_KEY
            );


            appData = {

                totalSeconds: 0,

                currentSeconds: 0,

                history: []

            };



            fillInputs();

            updateStats();

            renderHistory();

            refreshPie();



        });



        // Final startup refresh
        window.addEventListener(
            "load",
            () => {

                updateStats();

                renderHistory();

                refreshPie();

            }
        );

    </script>

</body>

</html>
